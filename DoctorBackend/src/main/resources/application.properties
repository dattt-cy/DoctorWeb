spring.application.name=DoctorBackend

# =============================================
# DATABASE - khớp với docker-compose.yml
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/doctorweb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234567890aS
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# FLYWAY (tự tạo bảng qua migration)
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# JWT & CORS
# =============================================
app.jwt.secret=DoctorWebSecretKey2024VeryLongAndSecure!@#
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:3000

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info

