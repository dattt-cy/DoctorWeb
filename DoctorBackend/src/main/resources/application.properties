spring.application.name=DoctorBackend

# =============================================
# DATABASE - khớp với docker-compose.yml
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/doctorweb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=root
spring.datasource.password=1234567890aS
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# FLYWAY (tự tạo bảng qua migration)
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================
# SERVER
# =============================================
server.port=8080

# =============================================
# JWT & CORS
# =============================================
app.jwt.secret=${JWT_SECRET:local-development-secret-change-before-production-123456}
app.jwt.expiration-ms=86400000
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.cors.allowed-origins=http://localhost:3000
app.admin.username=${ADMIN_USERNAME:victomblack1602}
app.admin.password=${ADMIN_PASSWORD:1234567890aS}

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info

# =============================================
# CLOUDINARY
# =============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:igqvsefd}
cloudinary.api-key=${CLOUDINARY_API_KEY:721977288986738}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:mE62_8izeAYYrZcGhSjyjsl4Gzk}
