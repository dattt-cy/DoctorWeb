services:
  mysql:
    image: mysql:8.0
    container_name: doctorweb-mysql
    environment:
      MYSQL_DATABASE: doctorweb
      MYSQL_USER: doctorweb
      MYSQL_PASSWORD: doctorweb
      MYSQL_ROOT_PASSWORD: rootpassword
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
